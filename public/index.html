<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>University Professor Scraper</title>
<style>
:root{
  --bg:#0d0f14;--s1:#161920;--s2:#1e2230;--border:#2a2f42;
  --accent:#4f8ef7;--accent2:#7c5bf7;--green:#3ecf8e;
  --yellow:#f5a623;--red:#f75f5f;--text:#e8eaf0;--muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}

header{border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:.8rem;background:var(--s1)}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
header h1{font-size:1rem;font-weight:600}
header p{font-size:.75rem;color:var(--muted);margin-left:auto}

main{flex:1;max-width:1280px;width:100%;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:340px 1fr;gap:1.2rem;align-items:start}

.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:1.1rem}
.card-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.9rem}

input[type=url],input[type=text]{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;padding:.6rem .85rem;outline:none;transition:border .2s;font-family:inherit}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

#scrapeBtn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:.9rem;font-weight:600;padding:.72rem;cursor:pointer;margin-top:.6rem;transition:opacity .2s,transform .1s}
#scrapeBtn:hover:not(:disabled){opacity:.9}
#scrapeBtn:active:not(:disabled){transform:scale(.98)}
#scrapeBtn:disabled{opacity:.45;cursor:not-allowed}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.stat{background:var(--s2);border-radius:8px;padding:.65rem}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.stat-label{font-size:.7rem;color:var(--muted);margin-top:2px}

.log-box{background:#080a0e;border:1px solid var(--border);border-radius:8px;padding:.7rem;font-family:monospace;font-size:.72rem;height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.log-line{line-height:1.55;padding:1px 0;word-break:break-all}
.log-line.nav{color:#38bdf8}
.log-line.extract{color:var(--green)}
.log-line.ai{color:var(--yellow)}
.log-line.err{color:var(--red)}
.log-line.done{color:var(--accent2);font-weight:600}
.log-line.info{color:var(--accent)}
.log-line.muted{color:var(--muted)}

.right-panel{display:flex;flex-direction:column;gap:1rem}
.results-header{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
.results-header h2{font-size:.95rem;font-weight:600}
.header-actions{display:flex;gap:.5rem}
#exportBtn,#exportJsonBtn{background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.8rem;padding:.42rem .85rem;cursor:pointer;display:none;white-space:nowrap}
#exportBtn:hover,#exportJsonBtn:hover{border-color:var(--accent);color:var(--accent)}

#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:.9rem}

.prof-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:.95rem;display:flex;flex-direction:column;gap:.45rem;transition:border-color .2s,transform .15s}
.prof-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.prof-header{display:flex;gap:.7rem;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;color:#fff}
.prof-name{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-title{font-size:.72rem;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prof-dept{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}
.prof-contacts{border-top:1px solid var(--border);padding-top:.45rem;margin-top:.1rem;display:flex;flex-direction:column;gap:.25rem}
.contact-row{font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;overflow:hidden}
.contact-row a{color:var(--accent);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.contact-row a:hover{text-decoration:underline}
.research-pill{font-size:.68rem;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);color:var(--accent);border-radius:999px;padding:2px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

.empty{grid-column:1/-1;text-align:center;padding:3.5rem 2rem;color:var(--muted)}
.empty .icon{font-size:2.5rem;margin-bottom:.8rem}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .8rem}
@keyframes spin{to{transform:rotate(360deg)}}

.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:.6rem;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s;width:0%}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:860px){
  main{grid-template-columns:1fr}
  .right-panel{order:-1}
  header p{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <h1>University Professor Scraper</h1>
  <p>Playwright + Groq AI Agent</p>
</header>

<main>
  <div style="display:flex;flex-direction:column;gap:1rem">

    <div class="card">
      <div class="card-title">Target University</div>
      <input type="url" id="urlInput" placeholder="https://www.ox.ac.uk" autocomplete="off" spellcheck="false"/>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <button id="scrapeBtn" onclick="startScrape()">▶ Run Agent</button>
    </div>

    <div class="card">
      <div class="card-title">Results</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-label">Professors</div></div>
        <div class="stat"><div class="stat-val" id="s-email">—</div><div class="stat-label">With Email</div></div>
        <div class="stat"><div class="stat-val" id="s-phone">—</div><div class="stat-label">With Phone</div></div>
        <div class="stat"><div class="stat-val" id="s-dept">—</div><div class="stat-label">With Dept</div></div>
        <div class="stat"><div class="stat-val" id="s-pages">—</div><div class="stat-label">Pages Visited</div></div>
        <div class="stat"><div class="stat-val" id="s-research">—</div><div class="stat-label">With Research</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Filter Results</div>
      <input type="text" id="filterInput" placeholder="Name, department, email…" oninput="filterResults()" autocomplete="off"/>
    </div>

    <div class="card">
      <div class="card-title">Agent Live Feed</div>
      <div class="log-box" id="logBox">
        <div class="log-line muted">Waiting to start…</div>
      </div>
    </div>

  </div>

  <div class="right-panel">
    <div class="results-header">
      <h2 id="resultsTitle">Professors</h2>
      <div class="header-actions">
        <button id="exportJsonBtn" onclick="exportJSON()">⬇ JSON</button>
        <button id="exportBtn" onclick="exportCSV()">⬇ CSV</button>
      </div>
    </div>
    <div id="results">
      <div class="empty"><div class="icon">🔍</div><p>Enter a university URL and click <strong>Run Agent</strong></p></div>
    </div>
  </div>
</main>

<script>
let allProfessors = [];
let currentReport = null;
let activeES       = null;
let pageCount      = 0;
let maxPages       = 30;

const COLORS = ["#4f8ef7","#7c5bf7","#3ecf8e","#f5a623","#f75f5f","#38bdf8","#a78bfa","#fb923c","#34d399","#f472b6"];

function initials(name){ return name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function avatarColor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; }

function classifyLog(msg){
  if(/📡|Loading|Navigating|📄|🔍 Searching/.test(msg)) return "nav";
  if(/✅|Cheerio|professors|Groq:|→/.test(msg))          return "extract";
  if(/🤖|Action:|AI|Groq rate/.test(msg))                return "ai";
  if(/⚠️|Error|failed|error/.test(msg))                  return "err";
  if(/✅ Done|Complete|Finalising/.test(msg))             return "done";
  if(/🎓|🎯|🚀|📋/.test(msg))                           return "info";
  return "muted";
}

function logLine(msg){
  const box = document.getElementById("logBox");
  const div = document.createElement("div");
  div.className = "log-line " + classifyLog(msg);
  div.textContent = msg;
  box.appendChild(div);
  // Keep max 300 lines to avoid memory issues on long scrapes
  while(box.children.length > 300) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;

  // Update progress bar from page count in log
  const m = msg.match(/\[(\d+)\/(\d+)\]/);
  if(m){ pageCount=parseInt(m[1]); maxPages=parseInt(m[2]); updateProgress(); }
}

function updateProgress(){
  const pct = Math.min(100, Math.round((pageCount/maxPages)*100));
  document.getElementById("progressFill").style.width = pct + "%";
}

function clearLog(){
  document.getElementById("logBox").innerHTML="";
  pageCount=0; maxPages=30;
  document.getElementById("progressFill").style.width="0%";
}

function updateStats(s){
  document.getElementById("s-total").textContent    = s.total          ?? "—";
  document.getElementById("s-email").textContent    = s.withEmail      ?? "—";
  document.getElementById("s-phone").textContent    = s.withPhone      ?? "—";
  document.getElementById("s-dept").textContent     = s.withDepartment ?? "—";
  document.getElementById("s-pages").textContent    = s.pagesScraped   ?? "—";
  document.getElementById("s-research").textContent = s.withResearch   ?? "—";
}

const ICON_EMAIL = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>`;
const ICON_PHONE = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.18 1.2 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`;
const ICON_LINK  = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`;

function escape(s){ return s ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }

function renderCard(p){
  const color    = avatarColor(p.name);
  const contacts = [];
  if(p.email)      contacts.push(`<div class="contact-row">${ICON_EMAIL}<a href="mailto:${escape(p.email)}">${escape(p.email)}</a></div>`);
  if(p.phone)      contacts.push(`<div class="contact-row">${ICON_PHONE}${escape(p.phone)}</div>`);
  if(p.profileUrl) contacts.push(`<div class="contact-row">${ICON_LINK}<a href="${escape(p.profileUrl)}" target="_blank" rel="noopener">Profile →</a></div>`);
  return `
    <div class="prof-card">
      <div class="prof-header">
        <div class="avatar" style="background:${color}">${escape(initials(p.name))}</div>
        <div style="flex:1;min-width:0">
          <div class="prof-name" title="${escape(p.name)}">${escape(p.name)}</div>
          ${p.title ? `<div class="prof-title" title="${escape(p.title)}">${escape(p.title)}</div>` : ""}
        </div>
      </div>
      ${p.department ? `<div class="prof-dept">🏛 ${escape(p.department)}</div>` : ""}
      ${p.research   ? `<div class="research-pill" title="${escape(p.research)}">${escape(p.research.slice(0,90))}${p.research.length>90?"…":""}</div>` : ""}
      ${contacts.length ? `<div class="prof-contacts">${contacts.join("")}</div>` : ""}
    </div>`;
}

function renderResults(list){
  const el = document.getElementById("results");
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="icon">😕</div><p>No professors found on this site.</p></div>`;
    return;
  }
  el.innerHTML = list.map(renderCard).join("");
}

function filterResults(){
  const q = document.getElementById("filterInput").value.toLowerCase().trim();
  if(!q){ renderResults(allProfessors); return; }
  renderResults(allProfessors.filter(p =>
    [p.name,p.title,p.department,p.email,p.research].some(v => v && v.toLowerCase().includes(q))
  ));
}

function setRunning(running){
  const btn = document.getElementById("scrapeBtn");
  btn.disabled = running;
  btn.textContent = running ? "⏳ Running…" : "▶ Run Agent";
  document.getElementById("progressBar").style.display = running ? "block" : "none";
}

async function startScrape(){
  const url = document.getElementById("urlInput").value.trim();
  if(!url){ alert("Please enter a university URL."); return; }

  // Validate URL format
  try{ new URL(url.startsWith("http") ? url : "https://"+url); } catch{ alert("Please enter a valid URL."); return; }

  // Cancel any existing stream
  if(activeES){ activeES.close(); activeES=null; }

  allProfessors=[]; currentReport=null;
  clearLog();
  document.getElementById("results").innerHTML=`<div class="empty"><div class="spinner"></div><p>Agent is working…</p></div>`;
  document.getElementById("exportBtn").style.display="none";
  document.getElementById("exportJsonBtn").style.display="none";
  document.getElementById("resultsTitle").textContent="Running…";
  document.getElementById("filterInput").value="";
  setRunning(true);
  updateStats({});

  const es = new EventSource(`/api/scrape?url=${encodeURIComponent(url)}`);
  activeES = es;

  es.onmessage = (e) => {
    let parsed;
    try{ parsed = JSON.parse(e.data); } catch{ return; }
    const { type, data } = parsed;

    if(type === "log")    { logLine(data.message); }
    if(type === "start")  { logLine(data.message); }
    if(type === "result") {
      currentReport   = data;
      allProfessors   = data.professors || [];
      updateStats(data.stats || {});
      renderResults(allProfessors);
      const count = allProfessors.length;
      document.getElementById("resultsTitle").textContent = `${data.universityName||"Results"} — ${count} professor${count!==1?"s":""}`;
      document.getElementById("exportBtn").style.display     = count ? "block" : "none";
      document.getElementById("exportJsonBtn").style.display = count ? "block" : "none";
    }
    if(type === "done") {
      logLine(data.message);
      es.close(); activeES=null;
      setRunning(false);
      document.getElementById("progressFill").style.width="100%";
    }
    if(type === "error") {
      logLine("Error: " + data.message);
      es.close(); activeES=null;
      setRunning(false);
    }
  };

  es.onerror = () => {
    // Only log if we haven't already closed intentionally
    if(activeES){
      logLine("Connection lost.");
      es.close(); activeES=null;
      setRunning(false);
    }
  };
}

async function exportCSV(){
  if(!currentReport) return;
  try{
    const res  = await fetch("/api/export/csv",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({professors:allProfessors, universityName:currentReport.universityName})
    });
    if(!res.ok) throw new Error("Export failed");
    const blob = await res.blob();
    const name = res.headers.get("Content-Disposition")?.match(/filename="(.+)"/)?.[1] || "faculty.csv";
    triggerDownload(blob, name);
  } catch(e){ alert("CSV export failed: " + e.message); }
}

function exportJSON(){
  if(!currentReport) return;
  const json = JSON.stringify({
    universityName: currentReport.universityName,
    url:            currentReport.url,
    timestamp:      currentReport.timestamp,
    stats:          currentReport.stats,
    professors:     allProfessors,
  }, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const name = (currentReport.universityName||"faculty").replace(/[^a-z0-9]/gi,"_").toLowerCase() + ".json";
  triggerDownload(blob, name);
}

function triggerDownload(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

document.getElementById("urlInput").addEventListener("keydown", e => { if(e.key==="Enter") startScrape(); });

// Warn before leaving while scrape is running
window.addEventListener("beforeunload", e => {
  if(activeES){ e.preventDefault(); e.returnValue=""; }
});
</script>
</body>
</html>
